name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The tag name becomes the release name, the GitHub release, and the image tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub release

jobs:
  # Gate the release on a green test suite (unit + integration/e2e with a real
  # Chromium) and a clean type-check. If this fails, nothing is published.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Chromium (so the browser-gated tests actually run)
        run: bunx playwright install --with-deps chromium
      - name: Type-check
        run: bunx tsc --noEmit
      - name: Test
        run: bun test

  # A notes-only GitHub release for the changelog. momus is distributed as a
  # Docker image (see the docker-* jobs), not as standalone binaries: the
  # compiled binary can't bundle Playwright's runtime node_modules resolution,
  # so the image ships momus in source mode with Chromium included.
  github-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  # Build the Docker image on native runners per architecture and push each by
  # digest (no tags yet). docker-merge stitches the digests into one multi-arch
  # tag. (docker/build-push-action's recommended multi-runner pattern.)
  # Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.
  docker-build:
    needs: test
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/momus
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single multi-arch tag on Docker Hub.
  docker-merge:
    needs: docker-build
    runs-on: ubuntu-latest
    env:
      IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/momus
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:latest"
