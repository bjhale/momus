name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The tag name becomes the release name, the GitHub release, and the image tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub release

jobs:
  # Gate the release on a green test suite (unit + integration/e2e with a real
  # Chromium) and a clean type-check. If this fails, nothing is published.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Chromium (so the browser-gated tests actually run)
        run: bunx playwright install --with-deps chromium
      - name: Type-check
        run: bunx tsc --noEmit
      - name: Test
        run: bun test

  # A notes-only GitHub release for the changelog. momus is distributed as the
  # Docker image (see the docker job) — Chromium and its dependencies are baked
  # in, so there are no standalone binaries to attach.
  github-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  # Build and push the multi-arch image in one shot: run on an arm64 runner and
  # let buildx build arm64 natively and amd64 under QEMU emulation.
  # Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.
  docker:
    needs: test
    runs-on: ubuntu-24.04-arm
    env:
      IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/momus
    steps:
      - uses: actions/checkout@v4

      # Register QEMU binfmt handlers so buildx can build the non-native (amd64)
      # platform via emulation.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push (arm64 native, amd64 emulated)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
